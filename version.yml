# CwF Version Information
# Machine-readable version data for the Coding with Files (CwF) system.

# Source of truth
# ---------------
# The current major.minor lives in implementation-guide/cwf-project.json under
#   versioning.major_minor          (e.g. "v1.0")
# The most recently bumped version lives in the same file under
#   versioning.last_released        (e.g. "v1.0.113")
#
# `cwf-version-next --task-num=N` composes "{major_minor}.N".
# `cwf-version-bump --task-num=N` writes last_released; honours
#   wf_step_config.retrospective.bump_version.
# `cwf-version-tag  --task-num=N` creates an annotated tag; honours
#   wf_step_config.retrospective.tag_version.
#
# See .cwf/docs/workflow/versioning-standard.md for the full standard.

scheme: semver
source-of-truth: implementation-guide/cwf-project.json
